# March Agent Configuration
# https://github.com/camopel/March
#
# Copy to ~/.march/config.yaml and customize.
# Environment variables: ${VAR} or ${VAR:default}
# All sections are optional — sensible defaults are used for anything omitted.

# ─── LLM Providers ───

llm:
  default: "bedrock"                   # Which provider to use (key from providers below)
  fallback_chain: []                   # Fallback order if default fails, e.g. ["ollama"]
  providers:
    bedrock:
      model: "anthropic.claude-sonnet-4-20250514-v1:0"
      name: "Claude Sonnet 4 (Bedrock)"
      region: "us-west-2"             # AWS region
      profile: ""                     # AWS CLI profile name (uses default chain if empty)
      max_tokens: 16384
      context_window: 200000
      temperature: 0.3
      timeout: 300
      reasoning: false
      streaming: true
      input_types: ["text", "image"]
      cost:                            # Per-million-token cost in USD (for tracking)
        input: 3.0
        output: 15.0
        cache_read: 0.3
        cache_write: 3.75

