# March Agent Configuration
# https://github.com/camopel/March
#
# Environment variables: ${VAR} or ${VAR:default}

llm:
  default: "openai"
  providers:
    openai:
      model: "gpt-4o"
      api_key: "${OPENAI_API_KEY}"
      max_tokens: 16384
      context_window: 128000
      temperature: 0.3
      timeout: 300
      reasoning: false
      streaming: true

